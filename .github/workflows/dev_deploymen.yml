# This workflow validates, deploys and runs the specified bundle
# within development target named "dev".
name: 'Deploy to Dev Databricks'

# Ensure that only a single job or workflow using the same concurrency group runs at a time
concurrency: 1

# Trigger this workflow whenever a pull request is pushed to the repo's dev branch
on:
  push:
    branches: [dev]
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'release' && 'dev' }}

    steps:
      # Check out this repo so that this workflow can access it
      - uses: actions/checkout@v4

      # Download and Run the Databricks CLI
      - name: Install Databricks CLI
        run: pip install databricks-cli

      # Validate the Databricks Bundle
      - name: Validate Databricks Bundle
        run: databricks bundle validate
        env:
          DATABRICKS_TOKEN: ${{ secrets.DEV_DBR_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DEV_DBR_HOST }}

      # Deploy the bundle to the "dev" target as defined in the bundle's settings file
      - name: Deploy Databricks Bundle
        run: databricks bundle deploy --target ${{ github.event_name == 'release' && 'dev' }}
        env:
          DATABRICKS_TOKEN: ${{ secrets.DEV_DBR_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DEV_DBR_HOST }}
